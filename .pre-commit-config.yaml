# You can run this locally with `pre-commit run --all`
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=crlf]
      - id: check-case-conflict
  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.14.0
    hooks:
      # Has unsafe autofixes. Let's find a better formatter: macisamuele/language-formatters-pre-commit-hooks#202
      # - id: pretty-format-toml
      #   args: [--autofix, --trailing-commas, --inline-comment-spaces, "1", --no-sort]
      - id: pretty-format-yaml
        args: [--autofix, --indent, "2", --offset, "2", --preserve-quotes]
      - id: pretty-format-ini
        args: [--autofix]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff # Run the linter.
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        # Supports a lot more filetypes, but only tagging those we use
        # https://github.com/pre-commit/mirrors-clang-format/blob/main/.pre-commit-hooks.yaml#L6
        types: [c++]
  # Requires having clang-format pre-installed and available on PATH
  - repo: https://github.com/Avasam/clang-format-swig
    rev: v0.0.1
    hooks:
      - id: clang-format-swig
        exclude: SWIG/swig_lib/
  # Somehow pre-commit installs the Windows Wheel on Linux: TODO: Raise upstream
  # - repo: local
  #   hooks:
  #     - id: clang-format-swig
  #       name: clang-format SWIG files
  #       language: python
  #       entry: clang-format-swig
  #       files: \.i$
  #       exclude: SWIG/swig_lib/
  #       additional_dependencies:
  #         - clang-format-swig==0.0.1
  #         - clang-format==18.1.8

# Vendored
exclude: ^(com/win32comext/mapi/src/MAPIStubLibrary/|Pythonwin/Scintilla/).*$

ci:
  autoupdate_schedule: quarterly
